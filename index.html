<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AirType - Bàn phím ảo không chạm (Web)</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }
        #output {
            width: 80%;
            max-width: 800px;
            height: 80px;
            font-size: 24px;
            padding: 10px;
            margin-bottom: 20px;
            background: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 8px;
            text-align: center;
        }
        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid #444;
        }
        .row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .key {
            background: #2b2b2b;
            color: #ddd;
            border: 1px solid #555;
            border-radius: 6px;
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            transition: 0.1s ease;
        }
        .key.wide {
            min-width: 70px;
        }
        .key.space {
            min-width: 250px;
        }
        .key.hover {
            background: #3a6ea5;
            border-color: #8ab4f8;
            color: white;
            transform: scale(1.05);
        }
        .key.click {
            background: #00bcd4;
            border-color: #fff;
            color: #000;
        }
        #cursor-dot {
            position: fixed;
            width: 15px;
            height: 15px;
            background: red;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px red;
            display: none;
        }
        #video {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 160px;
            height: 120px;
            border: 2px solid #555;
            border-radius: 8px;
            z-index: 10;
            transform: scaleX(-1); /* gương */
        }
    </style>
</head>
<body>

    <!-- Ô hiển thị văn bản đã gõ -->
    <input type="text" id="output" placeholder="Văn bản sẽ hiện ở đây..." readonly>

    <!-- Bàn phím ảo -->
    <div id="keyboard"></div>

    <!-- Con trỏ đỏ theo ngón tay -->
    <div id="cursor-dot"></div>

    <!-- Khung camera nhỏ (ẩn nếu không muốn thấy) -->
    <video id="video" autoplay playsinline></video>

    <!-- Import MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

    <script>
        const outputField = document.getElementById('output');
        const keyboardDiv = document.getElementById('keyboard');
        const cursorDot = document.getElementById('cursor-dot');
        const videoElement = document.getElementById('video');

        // Định nghĩa bàn phím (giống bản Python)
        const keyboardLayout = [
            ['Exit','`','1','2','3','4','5','6','7','8','9','0','-','=','BS'],
            ['Tab','q','w','e','r','t','y','u','i','o','p','[',']','\\'],
            ['Caps','a','s','d','f','g','h','j','k','l',';',"'",'Enter'],
            ['Shift','z','x','c','v','b','n','m',',','.','/','Shift'],
            ['Ctrl','Win','Alt','Space','Alt','Ctrl']
        ];

        const specialKeys = {
            'BS': 'Backspace',
            'Tab': 'Tab',
            'Caps': 'CapsLock',
            'Enter': 'Enter',
            'Shift': 'Shift',
            'Ctrl': 'Control',
            'Alt': 'Alt',
            'Win': 'Meta',
            'Space': ' '
        };

        // Xây dựng bàn phím HTML
        keyboardLayout.forEach((row) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';
            row.forEach(label => {
                const keyDiv = document.createElement('div');
                keyDiv.className = 'key';
                if (label === 'Space') keyDiv.classList.add('space');
                if (['Exit','Tab','Caps','Enter','Shift','Ctrl','Alt','Win','BS'].includes(label))
                    keyDiv.classList.add('wide');
                keyDiv.textContent = label;
                keyDiv.dataset.key = label;
                rowDiv.appendChild(keyDiv);
            });
            keyboardDiv.appendChild(rowDiv);
        });

        // MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onHandResults);

        // Camera
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        // Biến theo dõi
        let isPinching = false;
        let prevPinching = false;
        let currentFingerX = 0, currentFingerY = 0;
        let hoveredKeyElement = null;
        let clickedKeyElement = null;

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];  // ngón trỏ
                const thumbTip = landmarks[4];  // ngón cái

                // Lấy toạ độ theo video (đã flip ngang do transform: scaleX(-1))
                // Video width/height
                const vidW = videoElement.videoWidth;
                const vidH = videoElement.videoHeight;

                // Chuyển đổi sang pixel trên cửa sổ (giữ nguyên tỉ lệ)
                // Vì video bị flip ngang nên phải đảo x = 1 - x
                const ix = (1 - indexTip.x) * vidW;
                const iy = indexTip.y * vidH;
                const tx = (1 - thumbTip.x) * vidW;
                const ty = thumbTip.y * vidH;

                // Tỉ lệ video so với hiển thị thực tế của video element (có thể khác)
                const displayW = videoElement.clientWidth;
                const displayH = videoElement.clientHeight;
                const scaleX = displayW / vidW;
                const scaleY = displayH / vidH;

                // Toạ độ ngón trỏ trên toàn trang (gốc từ video)
                const videoRect = videoElement.getBoundingClientRect();
                const fingerScreenX = videoRect.left + ix * scaleX;
                const fingerScreenY = videoRect.top + iy * scaleY;

                // Cập nhật con trỏ đỏ
                cursorDot.style.display = 'block';
                cursorDot.style.left = fingerScreenX + 'px';
                cursorDot.style.top = fingerScreenY + 'px';
                currentFingerX = fingerScreenX;
                currentFingerY = fingerScreenY;

                // Phát hiện pinch
                const dist = Math.sqrt((ix - tx)**2 + (iy - ty)**2);
                const pinchThreshold = 40; // pixel (tuỳ chỉnh)
                prevPinching = isPinching;
                isPinching = dist < pinchThreshold;

                // Hover
                const elements = document.elementsFromPoint(fingerScreenX, fingerScreenY);
                let newHover = null;
                for (let el of elements) {
                    if (el.classList.contains('key')) {
                        newHover = el;
                        break;
                    }
                }

                // Xoá hover cũ
                if (hoveredKeyElement && hoveredKeyElement !== newHover) {
                    hoveredKeyElement.classList.remove('hover');
                }
                // Thêm hover mới
                if (newHover && newHover !== hoveredKeyElement) {
                    newHover.classList.add('hover');
                }
                hoveredKeyElement = newHover;

                // Xử lý pinch (click)
                if (isPinching && !prevPinching) {
                    if (newHover) {
                        // Hiệu ứng click
                        newHover.classList.add('click');
                        clickedKeyElement = newHover;
                        triggerKey(newHover.dataset.key);
                        setTimeout(() => {
                            if (clickedKeyElement === newHover) {
                                newHover.classList.remove('click');
                                // Nếu vẫn hover thì giữ màu hover
                                if (hoveredKeyElement === newHover) {
                                    newHover.classList.add('hover');
                                }
                            }
                        }, 200);
                    }
                } else if (!isPinching && prevPinching) {
                    if (clickedKeyElement) {
                        clickedKeyElement.classList.remove('click');
                        if (hoveredKeyElement === clickedKeyElement) {
                            hoveredKeyElement.classList.add('hover');
                        }
                        clickedKeyElement = null;
                    }
                }
            } else {
                // Không có tay
                cursorDot.style.display = 'none';
                if (hoveredKeyElement) {
                    hoveredKeyElement.classList.remove('hover');
                    hoveredKeyElement = null;
                }
            }
        }

        function triggerKey(label) {
            if (label === 'Exit') {
                // Dừng camera và thông báo
                cameraUtils.stop();
                alert('AirType đã dừng. Tải lại trang để dùng tiếp.');
                return;
            }
            if (label === 'Space') {
                outputField.value += ' ';
            } else if (label === 'BS') {
                outputField.value = outputField.value.slice(0, -1);
            } else if (['Tab','Caps','Enter','Shift','Ctrl','Alt','Win'].includes(label)) {
                // Các phím đặc biệt không gõ ký tự, có thể mô phỏng bằng event (tạm bỏ qua)
                console.log('Pressed special key:', label);
            } else {
                outputField.value += label;
            }
        }

        // Đảm bảo camera dừng khi rời trang
        window.addEventListener('beforeunload', () => {
            cameraUtils.stop();
        });
    </script>
</body>
</html>
